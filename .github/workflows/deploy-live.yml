name: Deploy Live

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy_frontend_live:
    name: Deploy Frontend (Netlify Live)
    runs-on: ubuntu-latest
    needs: verify
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN_PROD }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_PROD }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}
    steps:
      - name: Skip (live deploy secrets missing)
        if: ${{ env.NETLIFY_AUTH_TOKEN == '' || env.NETLIFY_SITE_ID == '' || env.VITE_API_BASE_URL == '' }}
        run: |
          echo "Live-Deploy uebersprungen: NETLIFY_* oder VITE_API_BASE_URL_PROD fehlt."

      - name: Checkout
        if: ${{ env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != '' && env.VITE_API_BASE_URL != '' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != '' && env.VITE_API_BASE_URL != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != '' && env.VITE_API_BASE_URL != '' }}
        run: npm ci

      - name: Build frontend for live
        if: ${{ env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != '' && env.VITE_API_BASE_URL != '' }}
        run: npm run build

      - name: Deploy to Netlify (live site)
        if: ${{ env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != '' && env.VITE_API_BASE_URL != '' }}
        run: npx netlify-cli deploy --dir=dist --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN" --prod --message "live-${GITHUB_SHA::7}"

